<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FoodBot — AI Recipe Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #161616;
      --border:    #2a2a2a;
      --accent:    #e8b96f;
      --accent2:   #c0533a;
      --text:      #f0ece4;
      --muted:     #7a7060;
      --user-bg:   #1f1a13;
      --bot-bg:    #181818;
      --radius:    16px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 760px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      padding: 24px 28px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      background: var(--bg);
    }
    .logo {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      display: grid; place-items: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.45rem;
      font-weight: 900;
      letter-spacing: -.01em;
      color: var(--text);
    }
    header p {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 1px;
      font-weight: 400;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      margin-left: auto;
      box-shadow: 0 0 8px #4ade8066;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .35; }
    }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Bubble ── */
    .bubble-wrap {
      display: flex;
      gap: 10px;
      animation: fadeUp .35s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .bubble-wrap.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 10px;
      flex-shrink: 0;
      display: grid; place-items: center;
      font-size: 15px;
      margin-top: 2px;
    }
    .avatar.bot  { background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%); }
    .avatar.user { background: #252218; border: 1px solid var(--border); }

    .bubble {
      max-width: 76%;
      padding: 13px 17px;
      border-radius: var(--radius);
      line-height: 1.65;
      font-size: .88rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble-wrap.bot  .bubble { background: var(--bot-bg);  border: 1px solid var(--border); border-top-left-radius: 4px; }
    .bubble-wrap.user .bubble { background: var(--user-bg); border: 1px solid #2e2718;       border-top-right-radius: 4px; }

    .bubble strong { color: var(--accent); font-weight: 600; }
    .bubble em     { color: var(--muted); }

    .bubble img.preview {
      display: block;
      max-width: 240px;
      border-radius: 10px;
      margin-bottom: 8px;
      border: 1px solid var(--border);
    }

    /* ── Typing indicator ── */
    .typing .bubble {
      padding: 14px 18px;
    }
    .dots span {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce .9s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: .15s; }
    .dots span:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0);    opacity: .4; }
      50%       { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Welcome card ── */
    .welcome {
      text-align: center;
      padding: 48px 20px;
      opacity: .7;
    }
    .welcome .icon { font-size: 3rem; margin-bottom: 14px; }
    .welcome h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .welcome p { font-size: .83rem; color: var(--muted); line-height: 1.7; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }
    .chip {
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: .78rem;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
      background: var(--surface);
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Input bar ── */
    .input-area {
      border-top: 1px solid var(--border);
      padding: 16px 18px 20px;
      background: var(--bg);
      flex-shrink: 0;
    }

    /* Image preview strip */
    #img-preview-wrap {
      display: none;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    #img-preview-wrap.visible { display: flex; }
    #img-preview-thumb {
      width: 48px; height: 48px;
      object-fit: cover;
      border-radius: 7px;
    }
    #img-preview-name { font-size: .78rem; color: var(--muted); flex: 1; }
    #img-remove {
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 1rem; padding: 2px 6px;
      border-radius: 6px;
      transition: color .15s;
    }
    #img-remove:hover { color: var(--accent2); }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #msg-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .88rem;
      font-weight: 300;
      resize: none;
      min-height: 46px;
      max-height: 140px;
      line-height: 1.5;
      outline: none;
      transition: border-color .2s;
    }
    #msg-input::placeholder { color: var(--muted); }
    #msg-input:focus { border-color: var(--accent); }

    .icon-btn {
      width: 46px; height: 46px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      display: grid; place-items: center;
      font-size: 1.05rem;
      transition: all .2s;
      flex-shrink: 0;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }

    #send-btn {
      width: 46px; height: 46px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #0d0d0d;
      cursor: pointer;
      display: grid; place-items: center;
      font-size: 1.1rem;
      transition: opacity .2s, transform .1s;
      flex-shrink: 0;
    }
    #send-btn:hover   { opacity: .88; }
    #send-btn:active  { transform: scale(.93); }
    #send-btn:disabled { opacity: .35; cursor: not-allowed; }

    #file-input { display: none; }

    .hint { font-size: .72rem; color: var(--muted); margin-top: 8px; text-align: center; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">🍜</div>
    <div>
      <h1>FoodBot</h1>
      <p>AI-powered recipe &amp; food assistant</p>
    </div>
    <div class="status-dot"></div>
  </header>

  <!-- Messages -->
  <div id="messages">
    <div class="welcome" id="welcome">
      <div class="icon">🥘</div>
      <h2>What shall we cook today?</h2>
      <p>Ask me for any recipe, or drop a food photo<br>and I'll identify it &amp; give you the full recipe.</p>
      <div class="chips">
        <div class="chip" onclick="quickSend('Recipe for butter chicken')">🍛 Butter Chicken</div>
        <div class="chip" onclick="quickSend('How do I make biryani?')">🍚 Biryani</div>
        <div class="chip" onclick="quickSend('Recipe for chocolate lava cake')">🎂 Lava Cake</div>
        <div class="chip" onclick="quickSend('Tell me a quick pasta recipe')">🍝 Pasta</div>
      </div>
    </div>
  </div>

  <!-- Input area -->
  <div class="input-area">
    <div id="img-preview-wrap">
      <img id="img-preview-thumb" src="" alt="preview" />
      <span id="img-preview-name"></span>
      <button id="img-remove" title="Remove image">✕</button>
    </div>
    <div class="input-row">
      <label for="file-input" class="icon-btn" title="Attach image">📷</label>
      <input type="file" id="file-input" accept="image/*" />
      <textarea id="msg-input" placeholder="Ask for a recipe or paste a food name…" rows="1"></textarea>
      <button id="send-btn" title="Send">➤</button>
    </div>
    <p class="hint">Supports text, images, or both · Powered by Llama 4 via Groq</p>
  </div>

</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('msg-input');
  const sendBtn    = document.getElementById('send-btn');
  const fileInput  = document.getElementById('file-input');
  const previewWrap= document.getElementById('img-preview-wrap');
  const previewThumb=document.getElementById('img-preview-thumb');
  const previewName= document.getElementById('img-preview-name');
  const imgRemove  = document.getElementById('img-remove');
  let selectedFile = null;

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  // Enter to send (shift+enter = newline)
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  sendBtn.addEventListener('click', sendMessage);

  // Image attach
  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    selectedFile = file;
    previewThumb.src = URL.createObjectURL(file);
    previewName.textContent = file.name;
    previewWrap.classList.add('visible');
  });

  imgRemove.addEventListener('click', clearImage);

  function clearImage() {
    selectedFile = null;
    fileInput.value = '';
    previewWrap.classList.remove('visible');
    previewThumb.src = '';
  }

  function quickSend(text) {
    inputEl.value = text;
    sendMessage();
  }

  function addBubble(role, html, imgSrc) {
    document.getElementById('welcome')?.remove();

    const wrap = document.createElement('div');
    wrap.className = `bubble-wrap ${role}`;

    const av = document.createElement('div');
    av.className = `avatar ${role}`;
    av.textContent = role === 'bot' ? '🤖' : '👤';

    const bub = document.createElement('div');
    bub.className = 'bubble';

    if (imgSrc) {
      const img = document.createElement('img');
      img.src = imgSrc; img.className = 'preview';
      bub.appendChild(img);
    }

    // render markdown-lite: **bold** and newlines
    const span = document.createElement('span');
    span.innerHTML = html
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
    bub.appendChild(span);

    wrap.appendChild(av);
    wrap.appendChild(bub);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }

  function addTyping() {
    document.getElementById('welcome')?.remove();
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap bot typing';
    wrap.id = 'typing-indicator';
    wrap.innerHTML = `
      <div class="avatar bot">🤖</div>
      <div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>`;
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    document.getElementById('typing-indicator')?.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text && !selectedFile) return;

    // Show user bubble
    const imgSrc = selectedFile ? URL.createObjectURL(selectedFile) : null;
    addBubble('user', text || '(image)', imgSrc);

    // Reset input
    inputEl.value = '';
    inputEl.style.height = 'auto';
    const fileToSend = selectedFile;
    clearImage();
    sendBtn.disabled = true;

    addTyping();

    const form = new FormData();
    if (text)       form.append('message', text);
    if (fileToSend) form.append('image', fileToSend);

    try {
      const res  = await fetch('/chat', { method: 'POST', body: form });
      const data = await res.json();
      removeTyping();
      if (data.error) {
        addBubble('bot', `⚠️ ${data.error}`);
      } else {
        addBubble('bot', data.reply);
      }
    } catch (err) {
      removeTyping();
      addBubble('bot', '⚠️ Connection error. Please try again.');
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
